# Tomcat
server:
  port: 9201

# Spring
spring: 
  autoconfigure:
    exclude: com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure
  application:
    # 应用名称
    name: integrity-system
  profiles:
    # 环境配置
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        loginUsername: admin
        loginPassword: 123456
    dynamic:
      druid:
        initial-size: 5
        min-idle: 5
        maxActive: 20
        maxWait: 60000
        connectTimeout: 30000
        socketTimeout: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        validationQuery: SELECT 1 FROM DUAL
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
        poolPreparedStatements: true
        maxPoolPreparedStatementPerConnectionSize: 20
        filters: stat,slf4j
        connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      datasource:
        master:
          driver-class-name: ${DB_DRIVER_CLASS_NAME:dm.jdbc.driver.DmDriver}
          url: ${DB_URL:jdbc:dm://${DM_HOST:localhost}:${DM_PORT:5236}/${DM_DATABASE:INTEGRITY-CLOUD}?schema=${DM_SCHEMA:INTEGRITY-CLOUD}}
          username: ${DB_USERNAME:${DM_USERNAME:SYSDBA}}
          password: ${DB_PASSWORD:${DM_PASSWORD:IntegritySupervision0}}
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: 127.0.0.1:8848
      config:
        # 配置中心地址
        server-addr: 127.0.0.1:8848
        # 配置文件格式
        file-extension: yml
        # 共享配置
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}

mybatis-plus:
  type-aliases-package: com.integrity.system
  mapper-locations: classpath:mapper/**/*.xml

springdoc:
  gatewayUrl: http://localhost:8080/${spring.application.name}
  api-docs:
    enabled: true
  info:
    title: System API
    description: System API
    contact:
      name: Integrity-Supervision-Platform
      url: https://integrity-supervision-platform.local
