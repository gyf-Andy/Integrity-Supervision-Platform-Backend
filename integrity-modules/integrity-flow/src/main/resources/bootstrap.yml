# Tomcat
server:
  port: 9204

# Spring
spring: 
  application:
    # 应用名称
    name: integrity-flow
  profiles:
    # 环境配置
    active: dev
  datasource:
    driver-class-name: ${DB_DRIVER_CLASS_NAME:dm.jdbc.driver.DmDriver}
    url: ${DB_URL:jdbc:dm://${DM_HOST:localhost}:${DM_PORT:5236}/${DM_DATABASE:INTEGRITY-CLOUD-FLOW}?schema=${DM_SCHEMA:INTEGRITY-CLOUD-FLOW}}
    username: ${DB_USERNAME:${DM_USERNAME:SYSDBA}}
    password: ${DB_PASSWORD:${DM_PASSWORD:IntegritySupervision0}}
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: 127.0.0.1:8848
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        # 配置中心地址
        server-addr: 127.0.0.1:8848
        # 配置文件格式
        file-extension: yml
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        # 共享配置
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}

mybatis-plus:
  type-aliases-package: com.integrity.flow.domain
  mapper-locations: classpath:mapper/**/*.xml
