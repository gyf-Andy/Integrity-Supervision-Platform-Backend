spring.datasource.platform=dm
spring.sql.init.platform=dm
db.num=1
db.pool.config.driverClassName=dm.jdbc.driver.DmDriver
db.url.0=jdbc:dm://${DM_HOST:host.docker.internal}:${DM_PORT:5236}/${DM_CONFIG_DATABASE:INTEGRITY-CONFIG}?schema=${DM_CONFIG_SCHEMA:SYSDBA}&compatibleMode=mysql
db.user=${DM_USERNAME:SYSDBA}
db.password=${DM_PASSWORD:IntegritySupervision0}
spring.datasource.url=jdbc:dm://${DM_HOST:host.docker.internal}:${DM_PORT:5236}/${DM_CONFIG_DATABASE:INTEGRITY-CONFIG}?schema=${DM_CONFIG_SCHEMA:SYSDBA}&compatibleMode=mysql
spring.datasource.username=${DM_USERNAME:SYSDBA}
spring.datasource.password=${DM_PASSWORD:IntegritySupervision0}
spring.datasource.driver-class-name=dm.jdbc.driver.DmDriver

nacos.naming.empty-service.auto-clean=true
nacos.naming.empty-service.clean.initial-delay-ms=50000
nacos.naming.empty-service.clean.period-time-ms=30000

management.endpoints.web.exposure.include=*

management.metrics.export.elastic.enabled=false
management.metrics.export.influx.enabled=false

server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b %D %{User-Agent}i %{Request-Source}i

server.tomcat.basedir=/home/integrity/nacos/tomcat/logs

nacos.security.ignore.urls=/,/error,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.ico,/console-ui/public/**,/v1/auth/**,/v1/console/health/**,/actuator/**,/v1/console/server/**

nacos.core.auth.system.type=nacos
nacos.core.auth.enabled=${NACOS_AUTH_ENABLE:false}
nacos.core.auth.default.token.expire.seconds=18000
nacos.core.auth.default.token.secret.key=${NACOS_AUTH_TOKEN}
nacos.core.auth.plugin.nacos.token.secret.key=${NACOS_AUTH_TOKEN}
nacos.core.auth.caching.enabled=true
nacos.core.auth.enable.userAgentAuthWhite=false
nacos.core.auth.server.identity.key=${NACOS_AUTH_IDENTITY_KEY:serverIdentity}
nacos.core.auth.server.identity.value=${NACOS_AUTH_IDENTITY_VALUE:security}

nacos.istio.mcp.server.enabled=false
