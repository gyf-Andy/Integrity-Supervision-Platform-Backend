name: ${COMPOSE_PROJECT_NAME:-integrity}

services:
  nacos:
    image: ${NACOS_IMAGE:-nacos/nacos-server:v3.2.2}
    pull_policy: if_not_present
    container_name: ${COMPOSE_PROJECT_NAME:-integrity}-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE:-false}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-security}
      DM_HOST: ${DM_HOST:-host.docker.internal}
      DM_PORT: ${DM_PORT:-5236}
      DM_CONFIG_DATABASE: ${DM_CONFIG_DATABASE:-INTEGRITY-CONFIG}
      DM_CONFIG_SCHEMA: ${DM_CONFIG_SCHEMA:-SYSDBA}
      DM_USERNAME: ${DM_USERNAME:-SYSDBA}
      DM_PASSWORD: ${DM_PASSWORD:-IntegritySupervision0}
    ports:
      - "8848:8848"
      - "8849:8080"
      - "9848:9848"
      - "9849:9849"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    volumes:
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties:ro
      - ./nacos/plugins:/home/nacos/plugins:ro
      - nacos-logs:/home/nacos/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - integrity-net

  redis:
    image: ${REDIS_IMAGE:-redis:8.8.0}
    pull_policy: if_not_present
    container_name: ${COMPOSE_PROJECT_NAME:-integrity}-redis
    restart: unless-stopped
    command: redis-server /home/integrity/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - ./redis/conf/redis.conf:/home/integrity/redis/redis.conf:ro
      - redis-data:/data
    networks:
      - integrity-net

  sentinel:
    image: ${SENTINEL_IMAGE:-bladex/sentinel-dashboard:1.8.7}
    pull_policy: if_not_present
    container_name: ${COMPOSE_PROJECT_NAME:-integrity}-sentinel
    restart: unless-stopped
    ports:
      - "8718:8858"
    networks:
      - integrity-net

  dm:
    profiles:
      - dm
    image: ${DM_IMAGE:-dm8_single:8.1.3.140}
    pull_policy: if_not_present
    container_name: ${COMPOSE_PROJECT_NAME:-integrity}-dm
    restart: unless-stopped
    ports:
      - "5236:5236"
    volumes:
      - dm-data:/opt/dmdbms/data
      - ../sql:/docker-entrypoint-initdb.d:ro
    networks:
      - integrity-net

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z}
    pull_policy: if_not_present
    container_name: ${COMPOSE_PROJECT_NAME:-integrity}-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - integrity-net

  minio-init:
    image: ${MINIO_MC_IMAGE:-quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z}
    pull_policy: if_not_present
    container_name: ${COMPOSE_PROJECT_NAME:-integrity}-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-integrity}
    entrypoint: >
      sh -c "until mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY; do echo 'waiting for minio...'; sleep 1; done;
      mc mb -p local/$$MINIO_BUCKET || true;
      mc anonymous set download local/$$MINIO_BUCKET;
      echo 'bucket ready';"
    networks:
      - integrity-net

networks:
  integrity-net:
    name: ${COMPOSE_PROJECT_NAME:-integrity}-net

volumes:
  nacos-logs:
  redis-data:
  dm-data:
  minio-data:
