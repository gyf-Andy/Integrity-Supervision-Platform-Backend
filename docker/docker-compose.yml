version : '3.8'
services:
  integrity-nacos:
    container_name: integrity-nacos
    image: nacos/nacos-server
    build:
      context: ./nacos
    environment:
      - MODE=standalone
      - DM_HOST=${DM_HOST:-host.docker.internal}
      - DM_PORT=${DM_PORT:-5236}
      - DM_CONFIG_DATABASE=${DM_CONFIG_DATABASE:-INTEGRITY-CONFIG}
      - DM_SCHEMA=${DM_DATABASE}
      - DM_USERNAME=${DM_USERNAME:-SYSDBA}
      - DM_PASSWORD=${DM_PASSWORD:-IntegritySupervision0}
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
  integrity-redis:
    container_name: integrity-redis
    image: redis
    build:
      context: ./redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/integrity/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/integrity/redis/redis.conf
  integrity-nginx:
    container_name: integrity-nginx
    image: nginx
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/integrity/projects/integrity-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - integrity-gateway
    links:
      - integrity-gateway
  integrity-gateway:
    container_name: integrity-gateway
    build:
      context: ./integrity/gateway
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - integrity-redis
    links:
      - integrity-redis
  integrity-auth:
    container_name: integrity-auth
    build:
      context: ./integrity/auth
      dockerfile: dockerfile
    ports:
      - "9200:9200"
    depends_on:
      - integrity-redis
    links:
      - integrity-redis
  integrity-modules-system:
    container_name: integrity-modules-system
    build:
      context: ./integrity/modules/system
      dockerfile: dockerfile
    ports:
      - "9201:9201"
    environment:
      - DM_HOST=${DM_HOST:-host.docker.internal}
      - DM_PORT=${DM_PORT:-5236}
      - DM_DATABASE=${DM_DATABASE:-INTEGRITY-CLOUD}
      - DM_SCHEMA=${DM_DATABASE}
      - DM_USERNAME=${DM_USERNAME:-SYSDBA}
      - DM_PASSWORD=${DM_PASSWORD:-IntegritySupervision0}
    depends_on:
      - integrity-redis
    links:
      - integrity-redis
  integrity-modules-gen:
    container_name: integrity-modules-gen
    build:
      context: ./integrity/modules/gen
      dockerfile: dockerfile
    ports:
      - "9202:9202"
    environment:
      - DM_HOST=${DM_HOST:-host.docker.internal}
      - DM_PORT=${DM_PORT:-5236}
      - DM_DATABASE=${DM_DATABASE:-INTEGRITY-CLOUD}
      - DM_SCHEMA=${DM_DATABASE}
      - DM_USERNAME=${DM_USERNAME:-SYSDBA}
      - DM_PASSWORD=${DM_PASSWORD:-IntegritySupervision0}
  integrity-modules-job:
    container_name: integrity-modules-job
    build:
      context: ./integrity/modules/job
      dockerfile: dockerfile
    ports:
      - "9203:9203"
    environment:
      - DM_HOST=${DM_HOST:-host.docker.internal}
      - DM_PORT=${DM_PORT:-5236}
      - DM_DATABASE=${DM_DATABASE:-INTEGRITY-CLOUD}
      - DM_SCHEMA=${DM_DATABASE}
      - DM_USERNAME=${DM_USERNAME:-SYSDBA}
      - DM_PASSWORD=${DM_PASSWORD:-IntegritySupervision0}
  integrity-modules-file:
    container_name: integrity-modules-file
    build:
      context: ./integrity/modules/file
      dockerfile: dockerfile
    ports:
      - "9300:9300"
    volumes:
    - ./integrity/uploadPath:/home/integrity/uploadPath
  integrity-visual-monitor:
    container_name: integrity-visual-monitor
    build:
      context: ./integrity/visual/monitor
      dockerfile: dockerfile
    ports:
      - "9100:9100"
